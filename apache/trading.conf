# /etc/apache2/sites-available/trading.conf
# 트레이딩 대시보드 전용 VirtualHost
# 기존 운영 중인 사이트(:8081)에는 영향 없음

<VirtualHost *:80>
    ServerName trading-aod.duckdns.org

    # ── 프론트엔드 정적 파일 (React 빌드 결과물) ──────────────
    DocumentRoot /var/www/trading/dist
    <Directory /var/www/trading/dist>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        # SPA 라우팅: 존재하지 않는 경로는 index.html로
        FallbackResource /index.html
    </Directory>

    # ── FastAPI 백엔드 프록시 ──────────────────────────────────
    ProxyPreserveHost On

    # REST API
    ProxyPass        /api  http://127.0.0.1:8000/api
    ProxyPassReverse /api  http://127.0.0.1:8000/api

    # WebSocket 실시간 데이터
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule ^/ws/(.*)$ ws://127.0.0.1:8000/ws/$1 [P,L]

    # ── 보안 헤더 ─────────────────────────────────────────────
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"

    ErrorLog  ${APACHE_LOG_DIR}/trading_error.log
    CustomLog ${APACHE_LOG_DIR}/trading_access.log combined
</VirtualHost>
